name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  wheel-smoke:
    name: Wheel Smoke Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Run wheel smoke tests
        run: |
          python -m pytest tests/test_wheel_smoke.py -v

      - name: Upload wheel artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: wheel-python-${{ matrix.python-version }}
          path: /tmp/wheel-smoke-*/dist/*.whl
          if-no-files-found: ignore

  core-tests:
    name: Core Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm]"
          pip install pytest build

      - name: Run core test suite
        run: |
          # Run all tests except live oracle tests (which require API key)
          python -m pytest tests/ \
            --ignore=tests/test_live_oracle_readiness.py \
            -v \
            --tb=short
        env:
          # Skip live tests by not setting HUSKS_ENABLE_LIVE_TESTS
          HUSKS_ENABLE_LIVE_TESTS: ""

  beta-acceptance:
    name: Beta Acceptance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm]"
          pip install pytest build

      - name: Run beta_seed three-machine proof (stub mode)
        run: |
          python -m pytest tests/test_beta_three_machine.py -v

      - name: Run beta_seed validator tests
        run: |
          python -m pytest tests/test_beta_seed_validator.py -v

      - name: Run compare-runs tests
        run: |
          python -m pytest tests/test_compare_runs.py -v

      - name: Run three-machine CLI acceptance
        run: |
          python -m pytest tests/test_three_machine_cli_acceptance.py -v
