name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      trials:
        description: "Live oracle: number of three-machine trials"
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy litellm
      - name: Ruff
        run: ruff check src/ tests/ scripts/
      - name: Mypy
        run: mypy src/husks/

  alpha:
    name: "Alpha (solid) · ${{ matrix.python }}"
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest litellm
      - name: Alpha tests (L0–L4)
        run: >
          python -m pytest
          tests/L0-kernel/
          tests/L1-forms/
          tests/L2-seal/
          tests/L3-engine/
          tests/L4-oracle/
          -v --tb=short

  beta-stub:
    name: "Beta stub (liquid) · ${{ matrix.python }}"
    needs: [alpha]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest litellm
      - name: Beta stub tests (L5–L6 + integration)
        run: >
          python -m pytest
          tests/L5-locke/
          tests/L6-inspect/
          tests/test_three_machine_stub.py
          tests/test_staging_sandbox.py
          tests/test_import_output_rejection.py
          -v --tb=short

  gamma:
    name: "Gamma (gas) · ${{ matrix.python }}"
    needs: [beta-stub]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov litellm
      - name: Gamma tests (L7–L8) + coverage
        run: >
          python -m pytest
          tests/L7-cli/
          tests/L8-pilot/
          -v --tb=short --cov=husks

  beta-live:
    name: Beta live (live oracle)
    if: github.event_name == 'workflow_dispatch'
    needs: [beta-stub]
    runs-on: ubuntu-latest
    environment: live-oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest litellm
      - name: Live three-machine proof
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUSKS_LIVE_TRIALS: ${{ github.event.inputs.trials }}
        run: python -m pytest tests/ -v --tb=short -k "live"
