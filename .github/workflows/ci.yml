name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      trials:
        description: "Live oracle: number of three-machine trials"
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy litellm
      - name: Ruff
        run: ruff check src/ tests/ scripts/
      - name: Mypy
        run: mypy src/husks/

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov litellm
      - name: Run all layer tests
        run: python -m pytest tests/ -v --tb=short --cov=husks

  three-machine-stub:
    name: Three-Machine Stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest litellm
      - name: Three-machine stub proof
        run: python -m pytest tests/test_three_machine_stub.py -v --tb=short

  live-oracle:
    name: Live Oracle
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: live-oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest litellm
      - name: Live three-machine proof
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUSKS_LIVE_TRIALS: ${{ github.event.inputs.trials }}
        run: python -m pytest tests/ -v --tb=short -k "live"
