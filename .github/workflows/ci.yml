name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      trials:
        description: "Liquid Beta: number of live three-machine trials to run"
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheel-smoke:
    name: Wheel Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          pip install dist/*.whl pytest
      - run: python -m pytest tests/test_SOLID_26_gate_g_wheel_smoke.py -v --tb=short

  solid-alpha:
    name: Solid Alpha
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      HUSKS_ENABLE_LIVE_TESTS: ""   # ensure no live path can be entered
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm]" pytest
      - name: Stub three-machine resolution (headline invariant)
        run: |
          python -m pytest \
            tests/test_LIQUID_69_three_machine_proof.py \
            tests/test_LIQUID_70_three_machine_cli_acceptance.py \
            tests/test_LIQUID_68_beta_three_machine.py \
            -v --tb=short
      - name: Full deterministic suite
        run: |
          python -m pytest tests/ -m "not beta" \
            --ignore=tests/test_SOLID_50_live_oracle_readiness.py \
            -v --tb=short

  liquid-beta:
    name: Liquid Beta (live three-machine)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: live-oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with live oracle extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm]" pytest
      - name: Live three-machine demo
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUSKS_ENABLE_LIVE_TESTS: "1"
          HUSKS_LIVE_TRIALS: ${{ github.event.inputs.trials }}
        run: |
          python -m pytest -m beta tests/test_SOLID_50_live_oracle_readiness.py \
            -v --tb=short
