[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "husks"
version = "0.1.0"
description = "A small build calculus for nondeterministic work."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "hy>=1.0.0",
]

[project.optional-dependencies]
llm = [
    "litellm",
]

[project.scripts]
husks = "husks.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
