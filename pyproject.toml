[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "husks"
version = "0.1.0"
description = "A small build calculus for nondeterministic work."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
llm = ["litellm"]
hy = ["hy>=1.0.0"]

[project.scripts]
husks = "husks.cli:main"
# husks-gate lives in the conformance package (spec/conformance_pkg),
# not the main wheel.  Install husks-conformance separately for the gate.

[tool.hatch.build.targets.wheel]
packages = ["src/husks"]

# Ship runtime data that lives outside the package tree, into the package.
# Editable installs don't materialize these; resources.py falls back to repo root.
[tool.hatch.build.targets.wheel.force-include]
"spec/conformance" = "husks/_resources/conformance"
"skills/husks" = "husks/_resources/skill"

[tool.pytest.ini_options]
pythonpath = ["src"]
