# layers.toml — Module layer assignment
#
# This file defines the DAG structure of the Husks codebase.
# - Every module is assigned a single layer index (0..6)
# - Imports must target a strictly lower layer
# - The import linter (husks doctor --arch) enforces this contract

# ── Layer assignments ─────────────────────────────────────────────

[layers]
# L0 — Kernel (CSE forms, codec, Merkle)
"husks.kernel" = 0
"husks.forms" = 0

# L1 — Sealing + FS
"husks.seal" = 1

# L2 — Engine + Oracle
"husks.engine" = 2
"husks.oracle" = 2

# L3 — Surface language
"husks.locke" = 3

# L4 — Config
"husks.config" = 4

# L5 — Inspection
"husks.report" = 5

# L6 — CLI
"husks.cli" = 6

# ── Special modules ───────────────────────────────────────────────

[isolated]
# The gate is now a standalone script (examples/core-bootstrap/gate.py)
# with zero husks dependencies.
