#   Was: oracle → oracle.litellm → oracle
#   Fix: Lazy get_backend() in oracle.__init__, leaf-base imports in litellm.py

# KNOWN CYCLE 3 (phase 2a): REMOVED ✓
#   Was: oracle → oracle.claude_code → oracle
#   Fix: Lazy get_backend() in oracle.__init__, leaf-base imports in claude_code.py

# KNOWN CYCLE 4 (phase 2b): REMOVED ✓
